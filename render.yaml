# Render Blueprint — deploys the backend as a Docker web service on Render.
# https://render.com/docs/blueprint-spec
#
# Import this repo at https://dashboard.render.com/blueprints.
# This blueprint provisions the full stack: Postgres, Redis, and the backend service.
# Render's free tier supports all three, though Postgres is limited to 90 days.

databases:
  - name: critiq-postgres
    plan: free
    databaseName: screening
    user: screening

services:
  - type: redis
    name: critiq-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
    # Backend reaches this over Render's private network (fromService below), so
    # no external IPs need access.
    ipAllowList: []

  - type: web
    name: critiq-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    # Free tier: no persistent disk, so ChromaDB lives on the ephemeral filesystem.
    # ingest.py runs on every start; the Dockerfile's conditional check finds no
    # existing data and does a full ingest (~30-60s added to each cold start/deploy).
    # Upgrade to "starter" (~$7/mo) and uncomment the disk stanza below to avoid this.
    plan: free
    healthCheckPath: /health

    # - disk:
    #     name: critiq-chroma
    #     mountPath: /data/chroma
    #     sizeGB: 1

    envVars:
      # LLM provider: "anthropic" (default) or "groq". Set the matching API key below.
      - key: LLM_PROVIDER
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: critiq-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: critiq-redis
          property: connectionString
      - key: ALLOWED_ORIGINS
        sync: false   # your Vercel frontend URL, e.g. https://critiq.vercel.app
      - key: APP_BASE_URL
        sync: false   # same Vercel URL - used to build invite/reset-password links

      # --- Security (set these before going live) ---
      - key: APP_ENV
        value: production   # enables startup security warnings; never change this on Render

      - key: SECURITY_HSTS_SECONDS
        value: "31536000"   # 1 year — Render always serves HTTPS, so this is safe and recommended

      # ADMIN_API_KEY_HASH: store the SHA-256 hex-digest of your chosen admin key.
      # The raw key never enters the process — only the digest is compared at runtime.
      # Generate: echo -n 'your-chosen-raw-key' | sha256sum
      - key: ADMIN_API_KEY_HASH
        sync: false
