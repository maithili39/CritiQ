# Render Blueprint — deploys the backend as a Docker web service on Render.
# https://render.com/docs/blueprint-spec
#
# Import this repo at https://dashboard.render.com/blueprints.
# This blueprint provisions the full stack: Postgres, Redis, and the backend service.
# Render's free tier supports all three, though Postgres is limited to 90 days.

databases:
  - name: critiq-postgres
    plan: free
    databaseName: screening
    user: screening

services:
  - type: redis
    name: critiq-redis
    plan: free
    maxmemoryPolicy: allkeys-lru

  - type: web
    name: critiq-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    # NOTE: changed from "free" — Render's free tier does not support persistent
    # disks. The "starter" plan (~$7/mo) is the minimum that allows the disk stanza
    # below. Without it, ChromaDB is on the ephemeral filesystem and every cold start
    # / redeploy re-ingests all PDFs from scratch (~30-60s startup latency per deploy).
    plan: starter
    healthCheckPath: /health

    # Persistent disk for ChromaDB so the vector store survives redeploys and
    # container restarts. ingest.py is idempotent (skips already-populated collections),
    # so if the data is intact from the last deploy, startup goes straight to uvicorn.
    disk:
      name: critiq-chroma
      mountPath: /data/chroma
      sizeGB: 1   # 3 PDFs → ~300 chunks → well under 100 MB; 1 GB is comfortable headroom

    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: critiq-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: critiq-redis
          property: connectionString
      - key: ALLOWED_ORIGINS
        sync: false   # your Vercel frontend URL, e.g. https://critiq.vercel.app
      - key: APP_BASE_URL
        sync: false   # same Vercel URL - used to build invite/reset-password links

      # Point the app at the mounted persistent disk instead of the container-local path.
      # Must match disk.mountPath above exactly.
      - key: CHROMA_PERSIST_DIR
        value: /data/chroma

      # --- Security (set these before going live) ---
      - key: APP_ENV
        value: production   # enables startup security warnings; never change this on Render

      - key: SECURITY_HSTS_SECONDS
        value: "31536000"   # 1 year — Render always serves HTTPS, so this is safe and recommended

      # ADMIN_API_KEY_HASH: store the SHA-256 hex-digest of your chosen admin key.
      # The raw key never enters the process — only the digest is compared at runtime.
      # Generate: echo -n 'your-chosen-raw-key' | sha256sum
      - key: ADMIN_API_KEY_HASH
        sync: false
