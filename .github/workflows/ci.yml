name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Single Python version declaration — must match backend/Dockerfile's base image.
# Update both together when upgrading Python.
env:
  PYTHON_VERSION: "3.12"

jobs:
  backend-lint:
    name: Backend lint (ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Check formatting with ruff
        run: ruff format --check .

  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest --cov=app --cov-report=term-missing

  backup-restore-drill:
    name: Backup / restore drill
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: screening
          POSTGRES_PASSWORD: screening
          POSTGRES_DB: screening
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U screening"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://screening:screening@localhost:5432/screening
      # Settings() requires these (no defaults) even though the drill never calls
      # Claude or issues a JWT — alembic/env.py imports app.core.config at import
      # time, same as the pytest suite (see tests/conftest.py's os.environ.setdefault).
      ANTHROPIC_API_KEY: test-key
      JWT_SECRET: test-secret-for-ci-drill-only
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          sudo apt-get update
          sudo apt-get install --yes postgresql-client

      - name: Run backup/restore drill
        run: |
          chmod +x scripts/backup.sh scripts/restore.sh scripts/backup_restore_drill.sh
          ./scripts/backup_restore_drill.sh

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Audit backend dependencies (pip-audit)
        # Blocking: pip-audit fails the job on any known CVE with an available fix.
        # To accept a finding with no fix yet, add it to the ignore list here AND
        # document it in SECURITY.md (Accepted / Deferred Findings table) with a
        # review-by date. Example:
        #   pip-audit -r backend/requirements.txt --ignore-vuln GHSA-xxxx-yyyy-zzzz
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Audit frontend dependencies (npm audit)
        # Blocking at the "high" severity threshold — critical/high CVEs in frontend
        # deps fail the job. Moderate/low are still reported but non-blocking.
        working-directory: frontend
        run: |
          npm ci
          npm audit --audit-level=high --omit=dev

  frontend-lint:
    name: Frontend lint (eslint)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint with ESLint
        # --max-warnings 0 promotes every warning to a failure so nothing slips through.
        run: npm run lint

  frontend-tests:
    name: Frontend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test -- --run

      - name: Typecheck and build
        run: npm run build
