name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest --cov=app --cov-report=term-missing

  backup-restore-drill:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: screening
          POSTGRES_PASSWORD: screening
          POSTGRES_DB: screening
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U screening"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://screening:screening@localhost:5432/screening
      # Settings() requires these (no defaults) even though the drill never calls
      # Claude or issues a JWT — alembic/env.py imports app.core.config at import
      # time, same as the pytest suite (see tests/conftest.py's os.environ.setdefault).
      ANTHROPIC_API_KEY: test-key
      JWT_SECRET: test-secret-for-ci-drill-only
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          sudo apt-get update
          sudo apt-get install --yes postgresql-client

      - name: Run backup/restore drill
        run: |
          chmod +x scripts/backup.sh scripts/restore.sh scripts/backup_restore_drill.sh
          ./scripts/backup_restore_drill.sh

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Audit backend dependencies (pip-audit)
        # Reports known CVEs in requirements.txt. continue-on-error for now: a first
        # run can surface pre-existing transitive-dependency vulnerabilities that
        # need triage, not an immediate hard fail blocking unrelated PRs. Tighten to
        # blocking once the backlog it finds is clean.
        continue-on-error: true
        run: |
          pip install pip-audit
          pip-audit -r backend/requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Audit frontend dependencies (npm audit)
        continue-on-error: true
        working-directory: frontend
        run: |
          npm ci
          npm audit --audit-level=high

  frontend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm run test -- --run

      - name: Typecheck and build
        run: npm run build
