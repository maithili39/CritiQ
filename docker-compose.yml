services:
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=screening
      - POSTGRES_PASSWORD=screening
      - POSTGRES_DB=screening
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U screening"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    # No host port mapping — only the backend needs it, over the internal Docker
    # network (redis://redis:6379). No reason to expose it to the host/internet.
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql+psycopg://screening:screening@postgres:5432/screening
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - ./backend/data:/app/data
      - ./backend/knowledge_base:/app/knowledge_base
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      - API_BASE=http://localhost:8000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

  backup:
    build:
      context: ./backend
      dockerfile: scripts/backup-cron/Dockerfile
    environment:
      - DATABASE_URL=postgresql+psycopg://screening:screening@postgres:5432/screening
    volumes:
      - ./backend/data:/app/data
      - ./backend/backups:/app/backups
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
