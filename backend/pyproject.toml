[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes (undefined names, unused imports, etc.)
    "I",   # isort (import ordering)
    "UP",  # pyupgrade (use modern Python idioms)
    "B",   # flake8-bugbear (common bug patterns)
    "C4",  # flake8-comprehensions (unnecessary comprehensions)
    "SIM", # flake8-simplify (simplifiable code)
    "RUF", # Ruff-specific rules
]
ignore = [
    "E501",   # line too long — handled by line-length above; formatter enforces it
    "B008",   # do not perform function calls in default args (FastAPI Depends pattern)
    "SIM108", # ternary operator — sometimes less readable than if/else
    "B904",   # Raise without from
    "E402",   # Module level import not at top of file
    "F401",   # Unused imports (we use them for __all__ exports in __init__)
]

[tool.ruff.lint.isort]
known-first-party = ["app"]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
